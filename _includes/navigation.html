<a class="brand-name" href="{{ "/" | prepend: site.baseurl }}">{{ site.title }}</a>

<p class="nav-label">Menu</p>
<ul class="nav-list">
  {% assign url = page.url | remove:'index.html' %}
  {% for link in site.navigation %}
    <li>
      <a class="nav-link{% if url == link.url %} active{% endif %}"
         href="{{ link.url | prepend: site.baseurl }}"
         title="{{ link.text }}">{{ link.text }}</a>
    </li>
  {% endfor %}
</ul>

<button class="theme-toggle" type="button" aria-label="Toggle dark mode">
  <span class="theme-toggle-label">Dark mode</span>
</button>
